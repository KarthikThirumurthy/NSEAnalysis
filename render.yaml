services:
  - type: web
    name: nse-share-analysis
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn flask_healthcheck:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DB_CONNECT_TIMEOUT
        value: "10"
      - key: DB_SSLMODE
        value: require
